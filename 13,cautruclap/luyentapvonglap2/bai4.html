<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let hang=7;
        let cot=15;
        for(let i=0;i<hang;i++){
            if(i==0) {
                for(let j=0;j<cot;j++)
                document.write("*");
            }
            document.write("<br>");
            if(i>=0&&i<hang-1){
                for(let j=0;j<cot;j++){
                    if(j==0||j==cot-1)
                    document.write("*");
                    else document.write("            ");
                }
                
            }
            
            if(i==hang-1) {
                for(let j=0;j<cot;j++)
                document.write("*");
            }
        }
    </script>
</body>
</html>
