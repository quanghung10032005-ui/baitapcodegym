<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n=prompt("nhập số nguyên dương: ");
        let i=2;
        let sum=1;
        while(i<=n){
            sum*=i;
            i++;
        }
        document.write("giai thừa của "+n+" là: "+sum);
    </script>
</body>
</html>
