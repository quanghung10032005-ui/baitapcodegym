<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Bài 3: Hiển thị ra 20 số trong dãy fibonacci đầu tiên. -->
     <script>
        let n=20;
        let s1=0;
        let s2=1;
        document.write(s1+"<br>");
        document.write(s2+"<br>");
        let i=3;
        while(i<=n){
            let s3=s1+s2;
            document.write(s3+"<br>");
            s1=s2;
            s2=s3;
            i++;
        }
     </script>
</body>
</html>
