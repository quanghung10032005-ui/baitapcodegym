    <script>
        function songuyento(){
        let n=prompt("nhập số nguyên tố cần tìm ");
        let count=0;
        let number=2;
        while (count<n) {
            let i=2;
            let check=true;
            while (i<number) {
                if(number%i===0){
                    check=false;
                    break;
                }
                i++;
            }
            if(check){
                console.log(number+"<br>");
                count++;
            }
            number++;
        }
    }
    </script>
