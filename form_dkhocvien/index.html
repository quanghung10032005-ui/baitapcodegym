<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng kí học viên
    </title>
</head>
<link rel="stylesheet" href="hocvien.css">
<body>
    <div class="div_body">
    <div>
        <h2 class="div_header">ĐĂNG KÍ HỌC VIÊN</h2>
    </div>
    <form >
        <table>
        <tr>
            <td><label for="name">Họ và tên</label></td>
            <td><input type="text" id="name" name="name"></td>
        </tr>
        <tr>
            <td><label for="date">Ngày sinh</label></td>
            <td><input type="date" id="date" name="date"></td>
        </tr>
        <tr>
            <td><label>Giới tính</label></td>
            <td>
                <input type="radio" name="gender" value="male" checked="checked">Nam
                <input type="radio" name="gender" value="female">Nữ
            </td>
        </tr>
        <tr>
            <td><label for="address">Địa chỉ</label></td>
            <td><textarea name="address" id="address" rows="3" cols="20"></textarea></td>
        </tr>
        <tr>
            <td><label for="class">Lớp</label></td>
            <td>
                <select name="class" id="class">
                    <option value="" disabled selected>--Chọn lớp--</option>
                    <option value="class_1">Lớp 1</option>
                    <option value="class_2">Lớp 2</option>
                    <option value="class_3">Lớp 3</option>
                    <option value="class_4">Lớp 4</option>  
                    <option value="class_5">Lớp 5</option>
                </select>
            </td>
        </tr>
        <tr>
            <td><label for="email">Email</label></td>
            <td><input type="email" id="email" name="email"></td>
        </tr>
        <tr>
            <td><label for="phone">Điện thoại</label></td>
            <td><input type="tel" id="phone" name="phone"></td>
        </tr>
        <tr>
            <td></td>
            <td>
                <input type="submit" name="dangki" value="Đăng kí">
                <input type="reset" name="nhaplai" value="Nhập lại">
            </td>
        </tr>
        </table>
    </form>
    </div>
</body>
</html>
