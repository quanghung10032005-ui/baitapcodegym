<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
input{
    width: 200px;
    
}
button{
     border-radius: 4px;
     border : none;
     background-color: rgb(3, 95, 64);
     color:white;
}
</style>
<body>
    <form>
        <fieldset>
            <legend>chuyển đổi nhiệt độ</legend>
        <input type="number" id="DoC"  placeholder="Độ c(Celsius)">
        <button type="button" onclick="chuyendoi()" >nhập</button>
        <p id="ketqua" >kết quả: </p>
        
        </fieldset>
    </form>
    <script>
        let doC=document.getElementById("DoC");
        let kq=document.getElementById("ketqua");
       
        function chuyendoi(){
              let C=parseFloat(doC.value);
        const ketquachuyendoi=9*C/5+32;
            kq.innerHTML="kết quả: "+ketquachuyendoi.toFixed(2)+ "";
        }
    </script>
</body>
</html>
