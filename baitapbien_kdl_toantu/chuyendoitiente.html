<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    input {
        width: 200px;
        padding:8px;
        border : 1px solid rgb(167, 161, 161);
        border-radius :4px;
        margin-top: 10px;
        border : none;
        border-bottom: 2px solid rgb(242, 22, 22);
        background-color: aliceblue;
    }
    select{
        width: 100px;
        padding:8px;
        border : 1px solid rgb(167, 161, 161);
        border-radius :4px;
        margin-top: 10px;
        border : none;
        border-bottom: 2px solid rgb(242, 22, 22);
        background-color: aliceblue;
    }
   th {
    padding: 10px;
    margin-top:10px;
    background-color: antiquewhite;
    border-top: 2px solid rgb(167, 161, 161);
    
  }
  td{
    padding : 10px;
    margin-top: 10px;
  }
  button{
    width: 100px;
    padding:8px;
    border : none;
    color: white;
    background-color: rgb(242, 22, 22);
    border-radius: 4px;
  }
  button:hover{
    background-color: rgb(170, 170, 243);
  }
  body{
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
</style>    
<body>
    <form>
        <table>
            <tr>
                <th>Amount</th>
                <th>From Currency</th>
                <th>To Currency</th>   
            </tr> 
            <tr>
                <td>
                    <input type="text" id="amount" placeholder="nhập số tiền">

                </td>
                <td>
                    <select id="fromCurrency">
                        <option value="USD">USD</option>
                        <option value="VND" selected>VND</option>
                    </select>
                </td>
                <td>
                    <select id="toCurrency">
                        <option value="USD">USD</option>
                        <option value="VND">VND</option>
                    </select>
                </td>
                <td>
                    <button type="button" onclick="convert()">Convert</button>
                </td>
            </tr>
            <tr>
                <td>
                    <p id="result">Result: </p>
                </td>
            </tr>
        </table>
    </form>
    <script>
        function convert(){
            let amount = parseFloat(document.getElementById("amount").value);
            let fromCurrency = document.getElementById("fromCurrency").value;
            let toCurrency = document.getElementById("toCurrency").value;
            if (fromCurrency == "USD" && toCurrency=="VND"){
                let result= amount*23000;
                document.getElementById("result").innerHTML="result: "+result+"Đ";
            }
            else if(fromCurrency == "VND" && toCurrency=="USD"){
                let result = amount/23000;
                document.getElementById("result").innerHTML="result: "+result+"$";  

            }
            else document.getElementById("result").innerHTML="result: "+amount;
        }
    </script>
</body>
</html>
