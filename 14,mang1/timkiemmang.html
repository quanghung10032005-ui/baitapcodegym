<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n=prompt("nhập số lượng phần tử ");
        let a=[];
        for (let i=0;i<n;i++){
            let input=prompt("nhập phần tử thứ "+i);
            a.push(input);
        }
        document.write("mảng: "+"["+a.join(",")+"]"+"<br>");
        let timkiem=prompt("nhập số cần tìm trong mảng ");
        let check=true;
        for(let i=0;i<n;i++){
            if(a[i]==timkiem){
                document.write(a[i] +" ở vị trí thứ: "+i);
                check=true;
            }
            else {
                
                check=false;
            }
        }
            if(!check){
                document.write("số này không tồn tại trong mảng");
            }
        
    </script>
</body>
</html>
