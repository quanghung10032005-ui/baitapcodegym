<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n= prompt("Nhập số lượng mảng: ");
        let a=[];
        for (let i=0;i<n;i++){
             let x=prompt("nhập phần tử thứ "+i);
             a.push(x);
        }
        document.write("mảng: ["+a.join(",")+"]" +"<br>");
        let max=a[0];
        for (let i=0;i<n;i++){
            if(a[i]>max)
            max=a[i];
        }
        document.write("max: "+max);
    </script>
</body>
</html>
