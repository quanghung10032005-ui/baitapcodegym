<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let x=[-3,5,1,3,2,10];
        console.log(x);
        let i=0;
        let j=x.length-1;
        while(i<j){
            let temp=x[i];
            x[i]=x[j];
            x[j]=temp;
            i++;
            j--;
        }
        console.log(x);
    </script>
</body>

</html>
