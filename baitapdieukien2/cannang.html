<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    label{
        display: inline-block;
        width: 100px;
        font-family: 'Arial', sans-serif;
    }
    input{
        margin-top:10px;
        padding:7px;
        border: 1px solid #ccc;
        border-radius: 4px;
        background-color:aliceblue ;
    }
    button{
        margin-top:10px;
        padding:5px;
        width: 80px;
        border:none;
        border-radius: 4px;
        background-color: #4CAF50;
        color: white;
        font-size: 16px;
    }
    button:hover{
        background-color: #45a049;
    }
    p[id="result"]{
        margin-top:10px;
        font-size: 18px;
        font-weight: bold;
    }
</style>
<body>
    <form>
        <fieldset>
            <legend>Cân nặng</legend>
            <label for="weight">Weight (kg):</label>
            <input type="number" id="weight" name="weight" step="0.1" placeholder="(kg)"><br>
            <label for="height">Height (cm):</label>
            <input type="number" id="height" name="height" step="1" placeholder="(mét)">
            <button type="button" onclick="BMI()" >Tính BMI</button>
            <p id="result">kết quả:</p>
        </fieldset>
    </form>
    <script>
        function BMI(){
            let weight=parseFloat(document.getElementById("weight").value);
            let height=parseFloat(document.getElementById("height").value);
            let kq=weight/(height**2);
            if(kq<18.5)
                document.getElementById("result").innerHTML="Kết quả: "+kq.toFixed(2)+" -underweight";      
            else if(kq<25)
                document.getElementById("result").innerHTML="Kết quả: "+kq.toFixed(2)+" -normal weight";
            else if(kq<30)
                document.getElementById("result").innerHTML="Kết quả: "+kq.toFixed(2)+" -overweight";
            else
                document.getElementById("result").innerHTML="Kết quả: "+kq.toFixed(2)+" -obese";

        }
    </script>
</body>
</html>
