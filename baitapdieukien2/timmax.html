<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //Nhập 3 số nguyên, tìm và in ra giá trị lớn nhất trong ba số đó.
        let a = parseInt(prompt("nhập số thứ nhất: "));
        let b = parseInt(prompt("nhập số thứ hai: "));
        let c = parseInt(prompt("nhập số thứ ba: "));
        let max=a;
        if(max<b)
        max=b;
        if(max<c)
        max=c;
        document.write("số lớn nhất là: "+max);
    </script>
</body>
</html>
