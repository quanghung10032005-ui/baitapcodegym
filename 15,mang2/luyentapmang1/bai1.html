<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Viết chương trình khởi tạo một mảng số nguyên gồm 10 phần tử.
      Chương trình thực hiện tính 
     và hiển thị xem có bao nhiêu số nguyên lớn hơn hoặc bằng 10. -->
     <script>
        let a=[];
        for(let i=0;i<10;i++){
            let n=parseInt(prompt(`nhập phần tử thứ: ${i+1}`));
            a.push(n);
            
        }
        document.write(a+"<br>");
        function kiemtra(a){
            let count=0;
            let str=[]
            for(let i=0;i<10;i++){
                if(a[i]>=10){
                    count=a[i];
                    str.push(count);
                }
                
            }
            return str;
        }
        document.write("các số lớn hơn 10 là: "+kiemtra(a));
     </script>
</body>
</html>
