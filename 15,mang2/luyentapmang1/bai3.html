<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Viết chương trình khởi tạo một mảng số nguyên.
      Hiển thị giá trị lớn nhất trong mảng đó. 
      In ra giá trị trung bình của các phần tử trong mảng. -->
      <script>
        let a=[];
        let n=parseInt(prompt("nhập số lượng phần tử !"));
        for(let i=0;i<n;i++){
            let data=parseInt(prompt(`Nhập phần tử thứ ${i+1}`));
            a.push(data);
        }
        document.write(a+"<br>");
        function max(a,n){
            let tong=0;
            let max=a[0];
            for(let i=0;i<n;i++){
                if(a[i]>max)
                max=a[i];
                tong+=a[i];
            }
            document.write("max = "+max);
            document.write(` TB = ${tong/n}`);
        }
        max(a,n);
      </script>
</body>
</html>
