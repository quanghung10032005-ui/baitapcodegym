<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Viết chương trình khởi tạo một mảng số nguyên gồm 10 
     phần tử khác nhau. Chương
      trình hiển thị phần tử có giá trị lớn nhất trong mảng và vị trí của phần tử đó.
       -->
      <script>
        let a=[];
        for (let i=0;i<10;i++){
            let n=parseInt(prompt(`nhập phần tử thứ :${i+1}`));
            a.push(n);
        }
        document.write(a+"<br>");
        function timmax(a){
            let MAX=a[0];
            let vitri=0;
            for (let i=0;i<10;i++){
                if(a[i]>MAX){
                MAX=a[i];
                vitri=i+1;
            }
            }
            
            document.write("max ="+MAX+" vị trí: "+vitri);
        }
        timmax(a);
        
      </script>
</body>
</html>
