<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a=[];
    for(let i=0;i<10;i++){
        let data=parseInt(prompt(`Nhập phần tử thứ ${i+1}`));
        a.push(data);
    }
    document.write(a+"<br>");
    function sapxep(a){
        
        for(let i=0;i<10;i++){
            for(let j=i+1;j<10;j++){
                if(a[i]>a[j]){
                let tmp = a[i];
                a[i]=a[j];
                a[j]=tmp;
                }
            }
        }
        return a;
    }
    document.write(sapxep(a));
    </script>
</body>
</html>
