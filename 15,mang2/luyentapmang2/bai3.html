<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Bài 3:
Viết chương trình khai báo một mảng ký tự và kích thước của mảng.

Yêu cầu: Đếm số ký tự số (0-9) trong mảng. -->
<script>
    let a=[];
    
    let n=parseInt(prompt("nhập số lượng phần tử "));
    for(let i=0;i<n;i++){
        let data=prompt(`nhập phần tử thứ ${i+1}`);
        a.push(data);
    }
    function kiemtrakytuso(a,n){
        let count=0;
        for(let i=0;i<n;i++){
            if(a[i]>='0'&&a[i]<='9') 
            count++;

        }
        return count;
    }
    document.write(a+"<br>");
    document.write("số ký tự số (0-9): "+kiemtrakytuso(a,n));
</script>
</body>
</html>
