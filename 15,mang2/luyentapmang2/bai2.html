<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Viết chương trình in các ký tự trong một mảng theo thứ tự đảo ngược.

Ví dụ:
Với mảng [ 'c', 's', 'c', '2', '6', '1' ], sau khi đảo ngược sẽ là: "162csc". -->
<script>
    let a=[];
    let n=parseInt(prompt("nhập số lượng phần tử "));
    for(let i=0;i<n;i++){
        let data=prompt(`nhập phần tử thứ ${i+1}`);
        a.push(data);
    }
    document.write("mảng: ["+a+"]");
    function daonguoc1(a,n){
        
        for(let i=0;i<a.length/2;i++){
            let tmp=a[i];
            a[i]=a[a.length-1-i];
            a[a.length-1-i]=tmp;
        }
        return a;
    }
    function daonguoc2(a,n){
        let str="";
        for(let i=a.length-1;i>=0;i--){
            str+=a[i];
        }
        return str;
    
    }
    document.write("mảng sau khi đảo ngược : ["+daonguoc2(a,n)+"]");
</script>
</body>
</html>
