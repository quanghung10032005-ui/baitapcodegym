<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a=prompt("nhập vào 1 dãy số ");
        let result=[a[0]];
        for(let i=1;i<a.length;i++){
            let sotruoc=parseInt(a[i-1]);
            let sohientai=parseInt(a[i]);
            if(sotruoc%2==0&&sohientai%2==0){
                result.push("-",a[i]);
            }
            else result.push(a[i]);

        }   
        document.write(result.join("")); 
    </script>
</body>
</html>
