<!DOCTYPE html>

<body>
    <script>
        let myColor=["Red","Green","White","black"];
        let result="";
        for(let i=0;i<myColor.length;i++){
            if(i==myColor.length-1) 
            result+=myColor[i];
        else
            result+=myColor[i]+",";
        }
        console.log(result);
    </script>
