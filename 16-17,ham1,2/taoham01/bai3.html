<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a=parseInt(prompt("nhập a"));
        let b=parseInt(prompt("nhập b"));
        function xuLyHaiSo(a, b) {
            if (a > b) {
                alert("Tham số thứ nhất (" + a + ") lớn hơn tham số thứ hai (" + b + ")!");
            } else {
                return alert( a + b);
            }
        }
xuLyHaiSo(a,b);
    </script>
</body>
</html>
