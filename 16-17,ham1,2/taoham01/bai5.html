<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let stars = ["Polaris", "Aldebaran", "Deneb", "Vega", "Altair", "Dubhe", "Regulus"];
        let constellations = ["Ursa Minor", "Taurus", "Cygnus", "Lyra", "Aquila", "Ursa Major", "Leo"];
        function timkiem(a){
            for(let i=0;i<stars.length;i++){
                if(stars[i].toLowerCase()===a.toLowerCase().trim())
                return constellations[i];
            }
            return null;
        }
        let n=prompt("nhập sao").trim();
       let kq= timkiem(n);
        if(kq!=null) 
            document.write(kq);
        else document.write("không có ");
        

    </script>
</body>
</html>
