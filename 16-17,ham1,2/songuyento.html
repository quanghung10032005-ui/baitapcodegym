<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n=0;
        do{

         n=parseInt(prompt("nhập số nguyên tố "));
        if(n>10000) {
            n=parseInt(prompt("nhập số nhỏ hơn 10000"));
        }
    }while(n>10000);
        function isPrime(a){
            for(let i=2;i<a;i++){
                if(a%i==0) 
                return false;
            
            }
            return true;
        }
        if(isPrime(n)) alert(n+ "là số nguyên tố");
        else alert(n+ " không là số nguyên tố");
    </script>
</body>
</html>
