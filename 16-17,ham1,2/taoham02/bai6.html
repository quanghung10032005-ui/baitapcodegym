<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Viết hàm nhận vào một số, kiểm tra xem số đó có 
     phải là số nguyên dương không.
Nếu là nguyên dương, trả về true; ngược lại trả về false. -->
<script>
    function kiemtranguyenduong(a){
        if(a%1==0&&a>0)
        return true;
    else return false;
    }
    let n=parseFloat(prompt("nhập 1 số"));
    if(kiemtranguyenduong(n))
    document.write("là số nguyên dương");
else document.write("không phải số nguyên dương");
</script>
</body>
</html>
