<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Kiểm tra ký tự số:

Viết hàm kiểm tra xem ký tự nhập vào có phải là ký tự số hay không.
Nếu là ký tự số, hàm trả về true; ngược lại trả về false. -->
<script>
    function isDigit(a){
        if(!isNaN(a))
        return true;
    else return false;
    }
    let n=prompt("nhập kí tự");
    if(isDigit(n))
    document.write("là số");
else document.write("không phải số");
</script>
</body>
</html>
