<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Viết hàm truyền vào 2 số nguyên bất kỳ và thực hiện đổi chỗ hai số đó. -->
     <script>
        function doicho(a,b){
            let tmp=a;
            a=b;
            b=tmp;
            document.write(a+"-"+b);
        }
        let a=parseInt(prompt("nhập a"));
        let b=parseInt(prompt("nhập b"));
        document.write(a+"-"+b+"<br>");
        doicho(a,b);
        
     </script>
</body>
</html>
